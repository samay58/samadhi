name: Samadhi
options:
  bundleIdPrefix: com.samaydhawan
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  SamadhiKit:
    path: Packages/SamadhiKit
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
targets:
  Samadhi:
    type: application
    platform: iOS
    sources:
      - App
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: SamadhiKit
        product: SamadhiDomain
      - package: SamadhiKit
        product: SamadhiDesign
      - package: SamadhiKit
        product: SamadhiMotion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samaydhawan.Samadhi
        PRODUCT_NAME: Samadhi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/Samadhi-Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
  SamadhiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/SamadhiTests
    dependencies:
      - target: Samadhi
      - package: SamadhiKit
        product: SamadhiDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samaydhawan.SamadhiTests
        GENERATE_INFOPLIST_FILE: YES
  SamadhiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/SamadhiUITests
    dependencies:
      - target: Samadhi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samaydhawan.SamadhiUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Samadhi:
    build:
      targets:
        Samadhi: all
        SamadhiTests: [test]
        SamadhiUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SamadhiTests
        - SamadhiUITests
  Samadhi MusicKit Gate:
    build:
      targets:
        Samadhi: all
    run:
      config: Debug
      commandLineArguments:
        "--music-feasibility": true
